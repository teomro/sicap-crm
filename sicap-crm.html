<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SICAP CRM — Monitorizare Contracte Web</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@400;500;600;700;800&display=swap"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:'Outfit',system-ui,sans-serif;transition:background .25s,color .25s}
body.dark{background:#070b12;color:#e2e8f0}
body.light{background:#f1f5f9;color:#0f172a}
::-webkit-scrollbar{width:5px;height:5px}
body.dark ::-webkit-scrollbar-track{background:#0d1421}
body.dark ::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
body.light ::-webkit-scrollbar-track{background:#e2e8f0}
body.light ::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:3px}
input,select,textarea,button{font-family:'Outfit',system-ui,sans-serif}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.35}}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .22s ease both}
.slide-in{animation:slideIn .22s ease both}
.drop-in{animation:dropIn .15s ease both}
.col-filter-input{width:100%;background:transparent;border:1px solid rgba(128,128,128,0.2);color:inherit;border-radius:5px;padding:4px 7px;font-size:11px;outline:none;transition:border-color .15s}
.col-filter-input:focus{border-color:#f59e0b}
.card-hover:hover{border-color:var(--hc)!important;transform:translateY(-2px);box-shadow:0 8px 24px var(--hs)}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid transparent}
.btn{cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.tab-btn{background:none;border:none;padding:12px 18px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
.th-btn{background:none;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;white-space:nowrap;padding:0;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.sort-menu{position:absolute;top:100%;left:0;z-index:50;border-radius:8px;padding:4px;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,0.3);animation:dropIn .15s ease both}
.sort-menu-item{display:block;width:100%;text-align:left;padding:7px 12px;font-size:12px;border:none;cursor:pointer;border-radius:5px;background:none;font-family:inherit;transition:background .1s}
</style>
</head>
<body class="dark">
<div id="root"></div>
<script>
var e=React.createElement,useState=React.useState,useEffect=React.useEffect,useRef=React.useRef,useMemo=React.useMemo,useCallback=React.useCallback;

var LS_C='sicap-crm-v3-contracts',LS_R='sicap-crm-v3-records',LS_T='sicap-crm-v3-theme';
var TODAY=new Date();

var RO_M={ianuarie:0,februarie:1,martie:2,aprilie:3,mai:4,iunie:5,iulie:6,august:7,septembrie:8,octombrie:9,noiembrie:10,decembrie:11,ian:0,feb:1,mar:2,apr:3,iun:5,iul:6,aug:7,sep:8,oct:9,noi:10,dec:11};

var STATUS={
  nou:          {label:'Nou',             col:'#64748b',bg:'#1e293b',bgL:'#f1f5f9'},
  contactat:    {label:'Contactat 📞',    col:'#3b82f6',bg:'#0f2544',bgL:'#eff6ff'},
  email_trimis: {label:'Email Trimis ✉',  col:'#8b5cf6',bg:'#1e1052',bgL:'#f5f3ff'},
  oferta_depusa:{label:'Ofertă Depusă 📋',col:'#f59e0b',bg:'#2d1f00',bgL:'#fffbeb'},
  castigat:     {label:'Câștigat ✓',      col:'#10b981',bg:'#022c1a',bgL:'#ecfdf5'},
  pierdut:      {label:'Pierdut ✗',       col:'#ef4444',bg:'#2c0a0a',bgL:'#fef2f2'},
};

var URGENCY={
  urgent: {label:'URGENT',      col:'#ef4444',bg:'rgba(239,68,68,0.08)', days:'≤ 30 zile'},
  warning:{label:'ATENȚIE',     col:'#f97316',bg:'rgba(249,115,22,0.08)',days:'31–60 zile'},
  monitor:{label:'MONITORIZARE',col:'#3b82f6',bg:'rgba(59,130,246,0.08)',days:'61–90 zile'},
};

var DARK={bg:'#070b12',surf:'#0d1421',card:'#111827',border:'rgba(255,255,255,0.06)',text:'#e2e8f0',muted:'#4b5563',accent:'#f59e0b',inputBg:'#070b12'};
var LIGHT={bg:'#f1f5f9',surf:'#ffffff',card:'#f8fafc',border:'rgba(0,0,0,0.09)',text:'#0f172a',muted:'#94a3b8',accent:'#d97706',inputBg:'#ffffff'};

var TEMPLATES=[
  {id:'initial',name:'Prezentare Inițială',
   sub:function(c){return 'Servicii găzduire web – ofertă pentru '+c.autoritate;},
   body:function(c){return 'Stimate/Stimată {PERSOANA_CONTACT},\n\nVă contactez în urma monitorizării achizițiilor publice. Am constatat că '+c.autoritate+' deține un contract de servicii web/găzduire cu termen de expirare apropiat și aș dori să vă prezint o ofertă competitivă.\n\nFirma noastră oferă:\n\n✓ Găzduire web SSD – uptime garantat 99.9%\n✓ Mentenanță CMS (WordPress) + actualizări lunare\n✓ Certificat SSL, backup zilnic, protecție malware\n✓ Reînnoire domeniu și management DNS\n✓ Email instituțional nelimitat\n✓ Conformitate GDPR și WCAG 2.1\n✓ Suport în limba română – răspuns < 4h\n\nValoarea se încadrează în limita achizițiilor directe.\n\nCu respect,\n[NUMELE DVS.] | [FIRMA]\nTel: [TELEFON] | Email: [EMAIL]';}},
  {id:'followup',name:'Follow-up după apel',
   sub:function(c){return 'Ofertă servicii web – '+c.autoritate;},
   body:function(c){return 'Stimate/Stimată {PERSOANA_CONTACT},\n\nVă mulțumesc pentru discuție. Conform celor agreate, vă transmit oferta:\n\nPACHET BASIC – 300 RON/lună\n• Găzduire 20 GB SSD + domeniu\n• Mentenanță CMS 2h/lună + SSL + backup\n\nPACHET STANDARD – 500 RON/lună\n• Găzduire 50 GB SSD + domeniu\n• Mentenanță 5h/lună + backup zilnic + email nelimitat\n\nPACHET PREMIUM – 800 RON/lună\n• Găzduire 100 GB SSD + IP dedicat\n• Mentenanță 10h/lună + monitorizare 24/7 + suport < 2h\n\nContract 12 luni. Tranziție asistată fără întrerupere.\n\nCu stimă,\n[NUMELE DVS.] | [FIRMA]';}},
  {id:'formal',name:'Notificare Ofertă SICAP',
   sub:function(c){return 'Ofertă publicată catalog SICAP – CPV 72415000-2';},
   body:function(c){return 'Stimate/Stimată {PERSOANA_CONTACT},\n\nAm publicat o ofertă în catalogul SICAP pentru '+c.autoritate+'.\n\n• Cod CPV: 72415000-2\n• Perioadă: 12 luni + 4 luni opțional\n• Servere România/UE (GDPR)\n• SLA garantat + suport română\n\nCăutați oferta noastră în platforma SICAP.\n\nCu respect,\n[NUMELE DVS.] | [FIRMA] | CUI: [CUI]';}}
];

function parseDate(s){
  if(!s)return null;
  if(s instanceof Date&&!isNaN(s))return s;
  s=String(s).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s)){var d=new Date(s);return isNaN(d)?null:d;}
  var dot=s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if(dot)return new Date(+dot[3],+dot[2]-1,+dot[1]);
  var ro=s.match(/^(\d{1,2})\s+([a-zA-Z]+)\s+(\d{4})/i);
  if(ro){var m=RO_M[ro[2].toLowerCase()];if(m!==undefined)return new Date(+ro[3],m,+ro[1]);}
  var d2=new Date(s);return isNaN(d2)?null:d2;
}
function autoMap(headers){
  var h=headers.map(function(s){return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();});
  var pats={id:['id','nr contract','numar'],autoritate:['autoritate','cumparator','institutie','beneficiar','entitate'],localitate:['localitate','oras','municipiu','comuna'],judet:['judet','county'],valoare:['valoare','pret','suma','val'],furnizor:['furnizor','ofertant','contractor','prestator'],cpv:['cpv','cod cpv'],descriere:['descriere','denumire','obiect','titlu'],dataAtribuire:['data atribuire','data publicare','publicat','data','date'],durateLuni:['durata','perioada','luni','months']};
  var map={};
  Object.keys(pats).forEach(function(field){
    var ps=pats[field];
    for(var i=0;i<h.length;i++){if(ps.some(function(p){return h[i].includes(p);})){map[field]=headers[i];break;}}
  });
  return map;
}
function normalize(rows,map){
  function get(row,field){return map[field]?row[map[field]]:undefined;}
  return rows.map(function(row,idx){
    var da=parseDate(get(row,'dataAtribuire'));
    var dur=parseInt(get(row,'durateLuni'))||12;
    var exp=null;if(da){exp=new Date(da);exp.setMonth(exp.getMonth()+dur);}
    var rawVal=get(row,'valoare');
    var valStr=String(rawVal===undefined||rawVal===null||rawVal===''?'0':rawVal);
    valStr=valStr.replace(/\s/g,'').replace(/\.(?=\d{3}[,\s])/g,'').replace(',','.');
    var val=parseFloat(valStr.replace(/[^\d.]/g,''))||0;
    return{id:String(get(row,'id')||'r'+idx),autoritate:String(get(row,'autoritate')||'Necunoscut'),localitate:String(get(row,'localitate')||''),judet:String(get(row,'judet')||''),valoare:val,furnizor:String(get(row,'furnizor')||''),cpv:String(get(row,'cpv')||'72415000-2'),descriere:String(get(row,'descriere')||''),dataAtribuire:da?da.toISOString():null,durateLuni:dur,dataExpirare:exp?exp.toISOString():null};
  }).filter(function(c){return c.autoritate!=='Necunoscut'||c.valoare>0;});
}
function daysUntil(d){return d?Math.round((new Date(d)-TODAY)/86400000):null;}
function urgencyOf(days){return days===null?'unknown':days<0?'expired':days<=30?'urgent':days<=60?'warning':days<=90?'monitor':'ok';}
function fmtDate(d){return d?new Date(d).toLocaleDateString('ro-RO',{day:'2-digit',month:'short',year:'numeric'}):'—';}
function fmtVal(v){
  if(!v||isNaN(v)||v<=0)return '—';
  return new Intl.NumberFormat('ro-RO',{minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(v))+' RON';
}
function lsGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function App(){
  var cs=useState(lsGet(LS_C)||[]);var contracts=cs[0];var setContracts=cs[1];
  var rs=useState(lsGet(LS_R)||{});var crm=rs[0];var setCrm=rs[1];
  var ts=useState('dashboard');var tab=ts[0];var setTab=ts[1];
  var thS=useState(lsGet(LS_T)||'dark');var theme=thS[0];var setTheme=thS[1];
  var impS=useState(null);var importRows=impS[0];var setImportRows=impS[1];
  var ihS=useState([]);var importHeaders=ihS[0];var setImportHeaders=ihS[1];
  var mapS=useState({});var mapping=mapS[0];var setMapping=mapS[1];
  var selS=useState(null);var selected=selS[0];var setSelected=selS[1];
  var ntS=useState('');var noteText=ntS[0];var setNoteText=ntS[1];
  var coS=useState('');var contact=coS[0];var setContact=coS[1];
  var tmS=useState(null);var tmpl=tmS[0];var setTmpl=tmS[1];
  // sort state: {col, dir} dir = 'asc'|'desc'
  var sortS=useState({col:'days',dir:'asc'});var sortCfg=sortS[0];var setSortCfg=sortS[1];
  var openMenuS=useState(null);var openMenu=openMenuS[0];var setOpenMenu=openMenuS[1];
  // column text filters
  var cfS=useState({autoritate:'',localitate:'',judet:'',furnizor:'',luna:'all',zi:'all',status:'all'});
  var cf=cfS[0];var setCf=cfS[1];
  var fileRef=useRef();

  var C=theme==='dark'?DARK:LIGHT;

  useEffect(function(){
    document.body.className=theme;
    document.body.style.background=C.bg;
    document.body.style.color=C.text;
  },[theme]);

  // close sort menu on outside click
  useEffect(function(){
    function handler(){setOpenMenu(null);}
    document.addEventListener('click',handler);
    return function(){document.removeEventListener('click',handler);};
  },[]);

  function saveContracts(d){setContracts(d);lsSet(LS_C,d);}
  function saveCrm(d){setCrm(d);lsSet(LS_R,d);}

  function handleFile(ev){
    var f=ev.target.files[0];if(!f)return;
    if(!window.XLSX){alert('Librăria XLSX nu s-a încărcat. Verificați conexiunea.');return;}
    var reader=new FileReader();
    reader.onload=function(e2){
      try{
        var wb=XLSX.read(e2.target.result,{type:'array',cellDates:true});
        var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
        if(!rows.length){alert('Fișierul nu conține date.');return;}
        var hdrs=Object.keys(rows[0]);
        setImportHeaders(hdrs);setImportRows(rows);setMapping(autoMap(hdrs));
      }catch(err){alert('Eroare la citire: '+err.message);}
    };
    reader.readAsArrayBuffer(f);ev.target.value='';
  }

  function confirmImport(){
    var norm=normalize(importRows,mapping);
    if(!norm.length){alert('Niciun contract valid. Verificați maparea.');return;}
    saveContracts(norm);setImportRows(null);setTab('contracte');
  }

  function updateCrm(id,field,val){
    var upd=Object.assign({},crm);
    upd[id]=Object.assign({},crm[id]||{});
    upd[id][field]=val;
    saveCrm(upd);
    if(selected&&selected.id===id)setSelected(function(s){return Object.assign({},s,{_crm:upd[id]});});
  }

  function openContract(c){
    setSelected(Object.assign({},c,{_crm:crm[c.id]||{status:'nou'}}));
    setNoteText((crm[c.id]&&crm[c.id].notes)||'');
    setContact((crm[c.id]&&crm[c.id].contactName)||'');
    setTmpl(null);
  }

  var enriched=useMemo(function(){
    return contracts.map(function(c){
      var days=daysUntil(c.dataExpirare);
      return Object.assign({},c,{days:days,urgency:urgencyOf(days),_crm:crm[c.id]||{status:'nou'}});
    });
  },[contracts,crm]);

  var urgent  =useMemo(function(){return enriched.filter(function(c){return c.urgency==='urgent'; }).sort(function(a,b){return a.days-b.days;});},[enriched]);
  var warning =useMemo(function(){return enriched.filter(function(c){return c.urgency==='warning';}).sort(function(a,b){return a.days-b.days;});},[enriched]);
  var monitor =useMemo(function(){return enriched.filter(function(c){return c.urgency==='monitor';}).sort(function(a,b){return a.days-b.days;});},[enriched]);

  // Apply text filters then sort
  var filtered=useMemo(function(){
    var rows=enriched.filter(function(c){
      var st=c._crm.status||'nou';
      if(cf.autoritate&&!c.autoritate.toLowerCase().includes(cf.autoritate.toLowerCase()))return false;
      if(cf.localitate&&!c.localitate.toLowerCase().includes(cf.localitate.toLowerCase()))return false;
      if(cf.judet&&!c.judet.toLowerCase().includes(cf.judet.toLowerCase()))return false;
      if(cf.furnizor&&!c.furnizor.toLowerCase().includes(cf.furnizor.toLowerCase()))return false;
      if(cf.status!=='all'&&st!==cf.status)return false;
      if(cf.luna!=='all'&&c.dataAtribuire){
        var m=new Date(c.dataAtribuire).getMonth();
        if(m!==parseInt(cf.luna))return false;
      }
      if(cf.zi!=='all'&&c.dataAtribuire){
        var d=new Date(c.dataAtribuire).getDate();
        if(d!==parseInt(cf.zi))return false;
      }
      return true;
    });
    // sort
    var col=sortCfg.col;var dir=sortCfg.dir;
    rows=rows.slice().sort(function(a,b){
      var av,bv;
      if(col==='autoritate'){av=a.autoritate.toLowerCase();bv=b.autoritate.toLowerCase();return dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);}
      if(col==='localitate'){av=(a.localitate||'').toLowerCase();bv=(b.localitate||'').toLowerCase();return dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);}
      if(col==='judet'){av=(a.judet||'').toLowerCase();bv=(b.judet||'').toLowerCase();return dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);}
      if(col==='furnizor'){av=(a.furnizor||'').toLowerCase();bv=(b.furnizor||'').toLowerCase();return dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);}
      if(col==='valoare'){return dir==='asc'?a.valoare-b.valoare:b.valoare-a.valoare;}
      if(col==='dataAtribuire'){av=a.dataAtribuire?new Date(a.dataAtribuire).getTime():0;bv=b.dataAtribuire?new Date(b.dataAtribuire).getTime():0;return dir==='asc'?av-bv:bv-av;}
      if(col==='dataExpirare'){av=a.dataExpirare?new Date(a.dataExpirare).getTime():0;bv=b.dataExpirare?new Date(b.dataExpirare).getTime():0;return dir==='asc'?av-bv:bv-av;}
      return 0;
    });
    return rows;
  },[enriched,cf,sortCfg]);

  function setCF(field,val){setCf(function(prev){var n=Object.assign({},prev);n[field]=val;return n;});}
  function clearFilters(){setCf({autoritate:'',localitate:'',judet:'',furnizor:'',luna:'all',zi:'all',status:'all'});setSortCfg({col:'dataAtribuire',dir:'desc'});}
  var hasFilters=cf.autoritate||cf.localitate||cf.judet||cf.furnizor||cf.luna!=='all'||cf.zi!=='all'||cf.status!=='all';

  // Build unique months and days from contracts for dropdowns
  var luniDisponibile=useMemo(function(){
    var LUNI=['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
    var seen={};
    enriched.forEach(function(c){if(c.dataAtribuire){var m=new Date(c.dataAtribuire).getMonth();seen[m]=LUNI[m];}});
    return Object.keys(seen).sort(function(a,b){return a-b;}).map(function(m){return{val:m,label:seen[m]};});
  },[enriched]);

  var zileDisponibile=useMemo(function(){
    var seen={};
    enriched.forEach(function(c){if(c.dataAtribuire){var d=new Date(c.dataAtribuire).getDate();seen[d]=d;}});
    return Object.keys(seen).sort(function(a,b){return a-b;}).map(function(d){return{val:d,label:d};});
  },[enriched]);

  function setSort(col,dir){setSortCfg({col:col,dir:dir});setOpenMenu(null);}

  // Sort menu component
  function SortMenu(props){
    var col=props.col;var label=props.label;var isText=props.isText;var isNum=props.isNum;var isDate=props.isDate;
    var isActive=sortCfg.col===col;
    var icon=isActive?(sortCfg.dir==='asc'?'↑':'↓'):'↕';
    var menuItems=[];
    if(isText){menuItems=[['asc','A → Z'],['desc','Z → A']];}
    else if(isNum||isDate){menuItems=[['asc','Mic → Mare'],['desc','Mare → Mic']];}
    else{menuItems=[['asc','↑ Crescător'],['desc','↓ Descrescător']];}

    return e('div',{style:{position:'relative'}},
      e('button',{
        className:'th-btn',
        style:{color:isActive?'#f59e0b':C.muted},
        onClick:function(ev){ev.stopPropagation();setOpenMenu(openMenu===col?null:col);}
      },label,e('span',{style:{fontSize:9,opacity:0.8}},icon)),
      openMenu===col&&e('div',{
        className:'sort-menu drop-in',
        style:{background:C.surf,border:'1px solid '+C.border},
        onClick:function(ev){ev.stopPropagation();}
      },
        menuItems.map(function(item){
          var active=isActive&&sortCfg.dir===item[0];
          return e('button',{
            key:item[0],
            className:'sort-menu-item',
            style:{color:active?'#f59e0b':C.text,background:active?'rgba(245,158,11,0.08)':'transparent'},
            onClick:function(){setSort(col,item[0]);}
          },item[1]);
        })
      )
    );
  }

  function Chip(props){
    var bg=theme==='dark'?props.bg:(props.bgL||props.bg);
    return e('span',{className:'pill',style:{background:bg||'transparent',color:props.col,borderColor:props.col+'44'}},props.children);
  }

  function CardComp(props){
    var c=props.c;var u=URGENCY[c.urgency];var st=STATUS[c._crm.status||'nou'];
    var stBg=theme==='dark'?st.bg:st.bgL;
    return e('div',{
      onClick:function(){openContract(c);},
      className:'card-hover',
      style:{'--hc':u?u.col:C.border,'--hs':(u?u.col:'#000')+'22',background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:16,cursor:'pointer',transition:'all .15s'}
    },
      e('div',{style:{fontSize:13,fontWeight:600,lineHeight:1.35,marginBottom:3,color:C.text}},c.autoritate),
      e('div',{style:{fontSize:11,color:C.muted,marginBottom:12}},[c.localitate,c.judet].filter(Boolean).join(', ')||'—'),
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}},

        'Exportați contractele din ',e('strong',{style:{color:C.accent}},'sicap.ai'),' → CPV ',e('strong',{style:{color:C.text}},'72415000-2'),', filtrați după dată, exportați CSV/XLS și importați aici.'
      ),
      e('button',{className:'btn',onClick:function(){fileRef.current.click();},style:{background:C.accent,color:'#000',borderRadius:10,padding:'14px 32px',fontWeight:800,fontSize:15}},'↑ Importă fișier CSV / XLS'),
      e('div',{style:{marginTop:14,fontSize:12,color:C.muted}},'Acceptă .csv · .xls · .xlsx · detectare automată coloane')
    );
  }

  return e('div',{style:{background:C.bg,minHeight:'100vh',display:'flex',flexDirection:'column'}},
    e('header',{style:{background:C.surf,borderBottom:'1px solid '+C.border,padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100}},
      e('div',{style:{display:'flex',alignItems:'center',gap:14}},
        e('div',{style:{fontSize:18,fontWeight:800,letterSpacing:'-0.5px',display:'flex',alignItems:'center',gap:8}},
          e('span',{style:{color:C.accent,fontSize:22}},'◈'),e('span',{style:{color:C.text}},'SICAP CRM')
        ),
        e('div',{style:{fontSize:11,color:C.muted,borderLeft:'1px solid '+C.border,paddingLeft:14}},'Monitorizare contracte web / hosting')
      ),
      e('div',{style:{display:'flex',gap:8,alignItems:'center'}},
        urgent.length>0&&e('div',{style:{background:'rgba(239,68,68,0.12)',color:'#ef4444',border:'1px solid rgba(239,68,68,0.25)',borderRadius:20,padding:'5px 14px',fontSize:12,fontWeight:700,animation:'blink 2s infinite'}},
          '🔴 '+urgent.length+(urgent.length===1?' contract expiră':' contracte expiră')+' în <30 zile'
        ),
        e('button',{className:'btn',title:'Comută tema',onClick:function(){var t=theme==='dark'?'light':'dark';setTheme(t);lsSet(LS_T,t);},style:{background:C.card,border:'1px solid '+C.border,color:C.text,borderRadius:8,padding:'8px 12px',fontSize:17,lineHeight:1}},theme==='dark'?'☀️':'🌙'),
        e('button',{className:'btn',onClick:function(){fileRef.current.click();},style:{background:C.accent,color:'#000',borderRadius:8,padding:'9px 20px',fontWeight:700,fontSize:13}},'↑ Import CSV / XLS'),
        e('input',{ref:fileRef,type:'file',accept:'.csv,.xls,.xlsx',style:{display:'none'},onChange:handleFile})
      )
    ),
    contracts.length>0&&e('nav',{style:{background:C.surf,borderBottom:'1px solid '+C.border,padding:'0 24px',display:'flex',gap:2}},
      [['dashboard','Dashboard'],['contracte','Contracte ('+contracts.length+')']].map(function(item){
        return e('button',{key:item[0],className:'tab-btn',onClick:function(){setTab(item[0]);},style:{color:tab===item[0]?C.text:C.muted,borderBottomColor:tab===item[0]?C.accent:'transparent'}},item[1]);
      })
    ),
    e('main',{style:{flex:1,padding:24,overflowY:'auto',background:C.bg}},
      contracts.length===0?e(EmptyState,null):tab==='dashboard'?e(Dashboard,null):e(TableView,null)
    ),
    e(ImportModal,null),
    e(Modal,null)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
